# 1.
Write-Host "`n[2/7] Creating all folders..." -ForegroundColor Yellow

$folders = @(
    # Common folders
    "src/common/constants",
    "src/common/decorators",
    "src/common/dto",
    "src/common/exceptions",
    "src/common/filters",
    "src/common/guards",
    "src/common/interceptors",
    "src/common/interfaces",
    "src/common/middleware",
    "src/common/pipes",
    "src/common/utils",
    
    # Config folder
    "src/config",
    
    # Identity structure
    "src/modules/identity/entities",
    "src/modules/identity/auth/guards",
    "src/modules/identity/auth/strategies",
    "src/modules/identity/auth/dto",
    "src/modules/identity/users/repository",
    "src/modules/identity/users/dto",
    "src/modules/identity/companies/repository",
    "src/modules/identity/companies/dto",
    "src/modules/identity/password/dto",
    
    # Shared folders
    "src/shared/database",
    "src/shared/cache",
    "src/shared/email",
    "src/shared/tenant",
    
    # Scripts & logs
    "src/scripts",
    "logs",
    "postman"
)

foreach ($folder in $folders) {
    New-Item -ItemType Directory -Force -Path $folder | Out-Null
    Write-Host "   Created: $folder" -ForegroundColor Gray
}

# 2.
Write-Host "`n[3/7] Generating modules..." -ForegroundColor Yellow

# Common module
nest generate module common --no-spec

# Shared modules
nest generate module shared/database --no-spec
nest generate module shared/cache --no-spec
nest generate module shared/email --no-spec
nest generate module shared/tenant --no-spec

# Identity main module
nest generate module modules/identity --no-spec

# Identity sub-modules
nest generate module modules/identity/auth --no-spec
nest generate module modules/identity/users --no-spec
nest generate module modules/identity/companies --no-spec
nest generate module modules/identity/password --no-spec

# 3.
Write-Host "`n[4/7] Generating controllers..." -ForegroundColor Yellow

# 
nest generate controller modules/identity/auth/auth --no-spec --flat
nest generate controller modules/identity/users/users --no-spec --flat
nest generate controller modules/identity/companies/companies --no-spec --flat
nest generate controller modules/identity/password/password --no-spec --flat

# 4.
Write-Host "`n[5/7] Generating services..." -ForegroundColor Yellow

nest generate service modules/identity/auth/auth --no-spec --flat
nest generate service modules/identity/users/users --no-spec --flat
nest generate service modules/identity/companies/companies --no-spec --flat
nest generate service modules/identity/password/password --no-spec --flat

# Shared services
nest generate service shared/database/database --no-spec --flat
nest generate service shared/cache/cache --no-spec --flat
nest generate service shared/email/email --no-spec --flat
nest generate service shared/tenant/tenant --no-spec --flat

# 5.
Write-Host "`n[6/7] Generating common components..." -ForegroundColor Yellow

# Decorators
nest generate decorator common/decorators/roles --no-spec --flat
nest generate decorator common/decorators/current-user --no-spec --flat
nest generate decorator common/decorators/public --no-spec --flat

# Guards
nest generate guard common/guards/jwt-auth --no-spec --flat
nest generate guard common/guards/roles --no-spec --flat

# Interceptors
nest generate interceptor common/interceptors/transform --no-spec --flat
nest generate interceptor common/interceptors/logging --no-spec --flat

# Filters
nest generate filter common/filters/http-exception --no-spec --flat

# Pipes
nest generate pipe common/pipes/validation --no-spec --flat
nest generate pipe common/pipes/sanitize --no-spec --flat

# Middleware
nest generate middleware common/middleware/logger --no-spec --flat
nest generate middleware common/middleware/sanitize --no-spec --flat

